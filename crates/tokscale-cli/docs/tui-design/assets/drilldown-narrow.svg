<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1120" viewBox="0 0 720 1120">
  <defs>
    <style>
      .mono { font-family: "SF Mono", "Menlo", "Monaco", "Consolas", monospace; }
      .h1 { font-size: 18px; font-weight: 800; fill: #d9dde5; }
      .h2 { font-size: 16px; font-weight: 800; fill: #7bd7c5; }
      .txt { font-size: 15px; fill: #cbd0d8; }
      .small { font-size: 13px; fill: #929baa; }
      .muted { fill: #818b99; }
      .green { fill: #95d36a; }
      .teal { fill: #28d1b1; }
      .blue { fill: #5c86ff; }
      .orange { fill: #ff9950; }
      .purple { fill: #9b72ff; }
      .yellow { fill: #e8c74f; }
      .panel { fill: #080d13; stroke: #344052; stroke-width: 1.2; }
      .panel2 { fill: #0b1118; stroke: #40506a; stroke-width: 1.2; }
      .row { fill: #0e151e; }
      .selected { fill: #86b6ce; }
      .barbg { fill: #1a222d; }
      .line { stroke: #252f3b; stroke-width: 1; }
    </style>
  </defs>

  <rect width="720" height="1120" fill="#070b10"/>
  <text x="18" y="30" class="mono h1 teal">Tokscale</text>
  <text x="110" y="30" class="mono small muted">Detail</text>
  <text x="524" y="30" class="mono small muted">Esc Back</text>
  <line x1="10" y1="46" x2="710" y2="46" class="line"/>

  <rect x="10" y="46" width="700" height="1026" class="panel"/>
