  <text x="52" y="718" class="mono small">   $52.73   60.1M tok   21 sessions</text>
  <text x="52" y="778" class="mono small muted">Narrow drilldown keeps the same page model.</text>
  <text x="52" y="804" class="mono small muted">Panels stack vertically; dense tables become two-line rows.</text>
  <line x1="38" y1="952" x2="682" y2="952" class="line"/>
  <text x="52" y="982" class="mono small">↑↓ rows   Enter next detail   Esc back</text>

  <rect x="10" y="1072" width="700" height="38" class="panel"/>
  <text x="24" y="1097" class="mono small">↑↓ Navigate   Enter Details   Esc Back   q Quit</text>
