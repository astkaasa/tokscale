  <rect x="170" y="374" width="360" height="14" class="barbg"/>
  <rect x="170" y="374" width="36" height="14" fill="#5c86ff"/>
  <text x="548" y="387" class="mono txt">7.0M</text>
  <text x="44" y="420" class="mono small muted">Output</text>
  <rect x="170" y="408" width="360" height="14" class="barbg"/>
  <rect x="170" y="408" width="12" height="14" fill="#28d1b1"/>
  <text x="548" y="421" class="mono txt">2.2M</text>
  <text x="44" y="454" class="mono small muted">Cache read</text>
  <rect x="170" y="442" width="360" height="14" class="barbg"/>
  <rect x="170" y="442" width="348" height="14" fill="#9b72ff"/>
  <text x="548" y="455" class="mono txt">289.4M</text>
  <text x="44" y="488" class="mono small muted">Cache write</text>
  <rect x="170" y="476" width="360" height="14" class="barbg"/>
  <rect x="170" y="476" width="10" height="14" fill="#e8c74f"/>
  <text x="548" y="489" class="mono txt">9.2M</text>

  <rect x="24" y="518" width="672" height="500" class="panel2"/>
  <text x="44" y="546" class="mono h2">Breakdown</text>
  <text x="522" y="546" class="mono small muted">Cost desc</text>
  <rect x="38" y="568" width="644" height="48" class="selected"/>
  <text x="52" y="590" class="mono txt">1  2026-06-09  Codex</text>
  <text x="52" y="610" class="mono small">   $108.44  131.1M tok  1,893 msgs</text>
  <rect x="38" y="622" width="644" height="48" class="row"/>
